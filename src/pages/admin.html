<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEO - Admin</title>
    <link rel="icon" type="image/png" href="../assets/favicon/favicon.png">
    <link rel="stylesheet" href="../css/style.css"> 
    <link rel="stylesheet" href="../css/signup.css">    
</head>
<body>
    <main class="login-wrapper">
        <section id="signup" class="login-card">
            <header class="login-header">
                <div>
                    <h1>Administrador</h1>
                </div>
                <div>
                    <li>
                        <a href="https://jefhter.github.io/teologando/">
                            <svg xmlns="https://jefhter.github.io/teologando/" width="16" height="16" fill="currentColor" class="bi-house" viewBox="0 0 16 16">
                                <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
                            </svg>
                        </a>
                    </li>
                    <li>
                        <a href="https://jefhter.github.io/teologando/src/pages/admin.html">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi-person-circle" viewBox="0 0 16 16">
                                <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                                <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                            </svg>
                            </svg>
                        </a>
                    </li>

                </div>
            </header>

            <form>
                <p class="form-instruction">Cadastre novos usuários.</p>

                <div class="input-group">
                    <input type="text" name="nome" id="nome-input" required placeholder="Nome completo">
                </div>

                <div class="input-group">
                    <input type="email" name="email" id="email-input" required placeholder="E-mail">
                </div>

                <div class="input-group">
                    <input type="text" name="usuario" id="user-input" required placeholder="Nome de usuário">
                </div>

                <div class="input-group">
                    <input type="password" name="senha" id="pass-input" required placeholder="Senha">
                </div>

                <div class="input-group">
                    <label for="user-type">Tipo de usuário</label>
                    <select id="user-type" name="user-type">
                        <option value="writer">Escritor</option>
                        <option value="reader">Leitor</option>
                    </select>
                </div>

                <button type="submit" id="btn-cadastrar">Cadastrar</button>
            </form>
        </section>
    </main>    
    <script type="module" src="../js/loadModules.js"></script>
    <script type="module" src="../js/signup.js"></script>
</body>
</html>

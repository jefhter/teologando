<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teologando</title>
    <link rel="icon" type="image/png" href="src/assets/favicon/favicon.png">
    <link rel="stylesheet" href="src/css/style.css"> 
</head>
<body>
    <!--- header modularizado  --->
    <div id="header-placeholder"></div>

    <main class="container">    
        <section class="welcome-section section-padding">
            <h1 class="welcome-title">Bem-vindo ao Teologando!</h1>
            <p class="welcome-text">
                Aqui falamos sobre Ortodoxia e Ortopraxia. 
            </p>
        </section>

        <section class="latest-post section-padding">
            <h2 class="indicador-ultimo-post">Direto do Forno</h2>         
            
            <article class="post-highlight-card">
                <!--- ultimo artigo modularizado  --->
                <div id="article-placeholder"></div>

                
            </article>
        </section>

        <section class="mission-summary section-padding">
            <div class="summary-cards-grid">
                <article class="summary-card">
                    <h3>Ortodoxia</h3>
                    <p>O foco na pureza da doutrina e nos ensinos bíblicos. O que cremos define o que somos.</p>
                    
                    <form id="form" action="https://jefhter.github.io/teologando/src/pages/view.html" method="get">
                        <input type="hidden" name="content" value="ORTODOXIA"></input>
                        <button type="submit" class="link-artigo">O que é Ortodoxia? →</button>
                    </form>
                </article>

                <article class="summary-card">
                    <h3>Ortopraxia</h3>
                    <p>A aplicação prática da fé na vida diária. O que praticamos reflete o que cremos.</p>

                    <form id="form" action="https://jefhter.github.io/teologando/src/pages/view.html" method="get">
                        <input type="hidden" name="content" value="ORTOPRAXIA"></input>
                        <button type="submit" class="link-artigo">O que é Ortopraxia? →</button>
                    </form>
                </article>
            </div>
        </section>

        <section>
            <form class="more-posts" action="https://jefhter.github.io/teologando/src/pages/articles.html" method="get">
                <button type="submit" class="all-posts-link">Veja mais aqui</button>
            </form>
        </section>
    </main>

    <!--- footer modularizado  --->
    <div id="footer-placeholder"></div>
    <script type="module" src="./src/js/loadModules.js"></script>
</body>
</html>
